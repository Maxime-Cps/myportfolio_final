<section class="hero-section" [class.fade-in-fwd-third]="showAnimation()">
  <div class="hero-left">
    <div class="status-badge">
      <span class="status-dot"></span>
      {{ 'home.badge' | translate }}
    </div>

    <p class="hero-greeting">{{ 'home.greeting' | translate }}</p>
    <h1 class="hero-name">{{ 'home.name' | translate }}</h1>

    <div class="hero-role">
      <span>{{ typewriterText() }}</span>
      <span class="cursor" [class.blink]="typewriterDone()">|</span>
    </div>

    <div class="tech-tags">
      <span class="tech-tag">Angular</span>
      <span class="tech-tag">TypeScript</span>
      <span class="tech-tag">Java</span>
      <span class="tech-tag">C#</span>
      <span class="tech-tag">.NET</span>
      <span class="tech-tag">SQL</span>
    </div>

    <app-button-links [showAnimation]="false"></app-button-links>
  </div>

  <div class="hero-right">
    <img id="selfie" ngSrc="/assets/img/me.png" height="344" width="344" [alt]="'home.imageAlt' | translate" priority />
  </div>
</section>

<div class="scroll-indicator" [class.visible]="showAnimation()">
  <span>↓</span>
</div>
