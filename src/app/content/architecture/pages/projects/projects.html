<section class="projects-section navigation-animation">
  <div class="projects-list">
    @for (project of projects; track project.id; let i = $index) {
      <button
        class="project-row"
        type="button"
        (click)="openProjectDetail(project)"
        [attr.aria-label]="project.titleKey | translate"
      >
        <span class="project-index">{{ (i + 1).toString().padStart(2, '0') }}</span>

        <div class="project-main">
          <div class="project-header">
            <h3 class="project-name">{{ project.titleKey | translate }}</h3>
            <div class="project-tech">
              @for (tech of project.technologies.slice(0, 5); track tech.name) {
                <i [class]="'tech-icon ' + tech.icon" [title]="tech.name"></i>
              }
            </div>
          </div>
          <div class="project-desc-wrap">
            <p class="project-desc">{{ project.descriptionKey | translate }}</p>
          </div>
        </div>

        <div class="project-thumb">
          <img [src]="project.coverImage.src" [alt]="project.coverImage.alt" loading="lazy" />
        </div>

        <span class="project-arrow">→</span>
      </button>
    }
  </div>
</section>

<app-project-detail-modal
  [project]="selectedProject()"
  [visible]="modalVisible()"
  (visibleChange)="onModalVisibleChange($event)"
/>
