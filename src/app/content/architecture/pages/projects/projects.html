<div class="projects container navigation-animation">
  @for (project of projects; track project.id) {
    <button
      type="button"
      class="card-container"
      [class]="project.id"
      (click)="openProjectDetail(project)"
    >
      <div class="card">
        <div class="img-content" [style.background]="'linear-gradient(-45deg, ' + project.gradientColors[0] + ' 0%, ' + project.gradientColors[1] + ' 100%)'">
          <img [src]="project.coverImage.src" [alt]="project.coverImage.alt" />
        </div>
        <div class="content">
          <p class="heading">{{ project.titleKey | translate }}</p>
          <p>{{ project.descriptionKey | translate }}</p>
        </div>
      </div>
    </button>
  }
</div>

<app-project-detail-modal
  [project]="selectedProject()"
  [visible]="modalVisible()"
  (visibleChange)="onModalVisibleChange($event)"
/>
