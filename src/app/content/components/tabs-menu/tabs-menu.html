<div class="skills-grid-container">
  <div class="skills-grid">
    @for (skill of skills; track skill.name) {
      <div class="skill-item">
        <div class="skill-icon" [innerHTML]="getSafeIcon(skill.icon)"></div>
        <span class="skill-name">{{ skill.name }}</span>
        <span class="skill-badge" [style.background-color]="categories()[skill.category].color">
          {{ categories()[skill.category].label }}
        </span>
        <div class="skill-bar-track">
          <div
            class="skill-bar-fill"
            [style.width]="barsVisible() ? (proficiencyMap[skill.name]) + '%' : '0%'"
            [style.background-color]="categories()[skill.category].color"
          ></div>
        </div>
      </div>
    }
  </div>
</div>
